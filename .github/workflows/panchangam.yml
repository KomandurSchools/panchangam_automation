name: Daily Panchangam WhatsApp Send

on:
  schedule:
    # 16:15 UTC = 09:45 PM IST, every day. The script itself now fetches
    # and sends TOMORROW's Panchangam (see main() in panchangam_daily.py)
    # so this evening run delivers the next day's Panchangam the night
    # before, instead of racing a 5 AM delivery window.
    #
    # Deliberately NOT on the exact hour - GitHub explicitly documents
    # that schedules firing exactly on the hour are the most likely to
    # be delayed, since that's when the most jobs across all of GitHub
    # queue up at once. A few minutes off the hour avoids that.
    - cron: '15 16 * * *'
  workflow_dispatch: {}   # lets you click "Run workflow" manually to test

jobs:
  send-panchangam:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily Panchangam script
        env:
          TEXTMEBOT_APIKEY: ${{ secrets.TEXTMEBOT_APIKEY }}
          RECIPIENT_NUMBERS: ${{ secrets.RECIPIENT_NUMBERS }}
        run: python panchangam_daily.py
