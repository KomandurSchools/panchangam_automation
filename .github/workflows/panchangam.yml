name: Daily Panchangam WhatsApp Send

on:
  schedule:
    # 23:57 UTC = 05:27 AM IST, every day. Deliberately NOT on the exact
    # hour (00:00 UTC / 5:30 sharp) - GitHub explicitly documents that
    # schedules firing exactly on the hour are the most likely to be
    # delayed or skipped, since that's when the most jobs across all of
    # GitHub queue up at once. A few minutes off the hour avoids that.
    - cron: '57 23 * * *'
  workflow_dispatch: {}   # lets you click "Run workflow" manually to test

jobs:
  send-panchangam:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily Panchangam script
        env:
          TEXTMEBOT_APIKEY: ${{ secrets.TEXTMEBOT_APIKEY }}
          RECIPIENT_NUMBERS: ${{ secrets.RECIPIENT_NUMBERS }}
        run: python panchangam_daily.py
